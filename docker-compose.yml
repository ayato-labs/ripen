services:
  ripen:
    image: ghcr.io/ayato-labs/ripen:latest
    container_name: ripen-hub
    ports:
      - "8377:8377"
    volumes:
      - ${RIPEN_HOST_DATA_DIR:-C:/Users/saiha/.ripen}:/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=INFO
    restart: unless-stopped
