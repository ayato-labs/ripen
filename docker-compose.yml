services:
  ripen:
    image: ghcr.io/ayato-labs/ripen:latest
    ports:
      - "${RIPEN_BIND_ADDRESS:-127.0.0.1}:8377:8377"
    volumes:
      - ripen_data:/data
    environment:
      - RIPEN_HOME=/data
      - LLM_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=INFO
    restart: unless-stopped

volumes:
  ripen_data:
