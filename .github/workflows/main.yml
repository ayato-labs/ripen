name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'COMMERCIAL.md'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'COMMERCIAL.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  lint_and_test:
    name: Lint and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: |
          uv run ruff check src tests
          uv run djlint src/ --check
      - name: Run Tests
        run: |
          # Tiered Testing: PRs only run fast unit tests. Full tests run on main.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running lightweight unit tests for PR..."
            uv run pytest tests/unit/ -v --timeout=60
          else
            echo "Running full test suite for main/push..."
            uv run pytest tests/unit/ tests/integration/ tests/system/ -v --durations=10 --timeout=120
          fi

  release:
    name: Semantic Release
    needs: lint_and_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install and Run Semantic Release
        id: semantic
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          uv pip install python-semantic-release
          
          uv run semantic-release version
          
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            uv run semantic-release publish
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

  build_assets:
    name: Build Windows Assets
    needs: [lint_and_test, release]
    if: |
      always() &&
      (needs.lint_and_test.result == 'success') &&
      (needs.release.result == 'success' || needs.release.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          ls -la
          uv pip install -e .
          uv pip install pyinstaller
      - name: Build with PyInstaller (Release)
        if: github.ref == 'refs/heads/main'
        run: |
          uv run pyinstaller --onefile --name Ripen --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/api/server.py
          uv run pyinstaller --onefile --name RipenInit --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/cli/init.py
      - name: Build with PyInstaller (Dev / PR)
        if: github.ref != 'refs/heads/main'
        run: |
          uv run pyinstaller --onefile --name Ripen-dev --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/api/server.py
          uv run pyinstaller --onefile --name RipenInit-dev --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/cli/init.py
      - name: Get Latest Tag
        id: tag
        shell: bash
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            TAG=$(git rev-parse --short HEAD)
            echo "Warning: No annotated tag found, using commit SHA: $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        if: needs.release.outputs.new_release_published == 'true'
        with:
          files: |
            dist/Ripen.exe
            dist/RipenInit.exe
          tag_name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: false
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Binaries as Artifacts (Non-Release / Dev)
        uses: actions/upload-artifact@v4
        if: github.ref != 'refs/heads/main' || needs.release.outputs.new_release_published != 'true'
        with:
          name: ripen-windows-binaries-${{ github.sha }}
          path: |
            dist/Ripen-dev.exe
            dist/RipenInit-dev.exe
          retention-days: 7
      - name: Upload Binaries to Pre-Release (dev-latest)
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        with:
          files: |
            dist/Ripen-dev.exe
            dist/RipenInit-dev.exe
          tag_name: dev-latest
          name: "Development Build (dev-latest)"
          body: |
            This is an automated pre-release build of the `develop` branch.
            Latest update: ${{ github.event.head_commit.message }} (commit: ${{ github.sha }})
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  test_windows:
    name: Integration & E2E Test (Windows Native)
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          uv pip install -e .
          uv pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --onefile --name Ripen --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/api/server.py
      - name: Start Ripen Server (.exe)
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\dist\Ripen.exe" -ArgumentList "--port 8377" -PassThru -NoNewWindow
          echo "PROCESS_ID=$($process.Id)" >> $GITHUB_ENV
      - name: Wait for Health Check
        shell: pwsh
        run: |
          $timeout = 30
          while ($timeout -gt 0) {
            try {
              $response = Invoke-WebRequest -Uri http://localhost:8377/api/health -UseBasicParsing
              if ($response.Content -match "ok") {
                Write-Host "Server is healthy!"
                exit 0
              }
            } catch {
              # Ignore errors during startup
            }
            Start-Sleep -Seconds 1
            $timeout--
          }
          Write-Error "Timeout waiting for health check"
          exit 1
      - name: E2E Test (Initialize MCP)
        shell: pwsh
        run: |
          $body = @{
            jsonrpc = "2.0"
            id = 1
            method = "initialize"
            params = @{
              protocolVersion = "2024-11-05"
              capabilities = @{}
              clientInfo = @{
                name = "e2e-test"
                version = "1.0.0"
              }
            }
          } | ConvertTo-Json -Depth 5
          
          $response = Invoke-WebRequest -Uri http://localhost:8377/mcp -Method Post -Body $body -ContentType "application/json" -Headers @{"Accept" = "application/json, text/event-stream"} -UseBasicParsing
          Write-Host "Response: $($response.Content)"
          if ($response.Content -match "protocolVersion") {
            Write-Host "MCP Initialize successful!"
          } else {
            Write-Error "MCP Initialize failed"
            exit 1
          }
      - name: Stop Ripen Server
        if: always()
        shell: pwsh
        run: |
          if ($env:PROCESS_ID) {
            Stop-Process -Id $env:PROCESS_ID -Force
          }

