name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'COMMERCIAL.md'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'COMMERCIAL.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  lint_and_test:
    name: Lint and Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: |
          uv run ruff check src tests
          uv run djlint src/ --check
      - name: Run Tests
        run: |
          # Tiered Testing: PRs only run fast unit tests. Full tests run on main.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running lightweight unit tests for PR..."
            uv run pytest tests/unit/ -v --timeout=60
          else
            echo "Running full test suite for main/push..."
            uv run pytest tests/unit/ tests/integration/ tests/system/ -v --durations=10 --timeout=120
          fi

  release:
    name: Semantic Release
    needs: lint_and_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install and Run Semantic Release
        id: semantic
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          uv pip install python-semantic-release
          
          uv run semantic-release version
          
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            uv run semantic-release publish
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

  build_assets:
    name: Build Windows Assets
    needs: release
    # Only run when a new release is actually published
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.new_release_published == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          ls -la
          uv pip install -e .
          uv pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --onefile --name Ripen --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/api/server.py
          uv run pyinstaller --onefile --name RipenInstaller --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/cli/register.py
      - name: Get Latest Tag
        id: tag
        shell: bash
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            TAG=$(git rev-parse --short HEAD)
            echo "Warning: No annotated tag found, using commit SHA: $TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Ripen.exe
            dist/RipenInstaller.exe
          tag_name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: false
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  test_windows:
    name: Integration & E2E Test (Windows Native)
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.new_release_published == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          uv pip install -e .
          uv pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --onefile --name Ripen --copy-metadata fastmcp --copy-metadata ripen --collect-all fastembed --collect-all faiss --clean src/ripen/api/server.py
      - name: Start Ripen Server (.exe)
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\dist\Ripen.exe" -ArgumentList "--port 8377" -PassThru -NoNewWindow
          echo "PROCESS_ID=$($process.Id)" >> $GITHUB_ENV
      - name: Wait for Health Check
        shell: pwsh
        run: |
          $timeout = 30
          while ($timeout -gt 0) {
            try {
              $response = Invoke-WebRequest -Uri http://localhost:8377/api/health -UseBasicParsing
              if ($response.Content -match "ok") {
                Write-Host "Server is healthy!"
                exit 0
              }
            } catch {
              # Ignore errors during startup
            }
            Start-Sleep -Seconds 1
            $timeout--
          }
          Write-Error "Timeout waiting for health check"
          exit 1
      - name: E2E Test (Initialize MCP)
        shell: pwsh
        run: |
          $body = @{
            jsonrpc = "2.0"
            id = 1
            method = "initialize"
            params = @{
              protocolVersion = "2024-11-05"
              capabilities = @{}
              clientInfo = @{
                name = "e2e-test"
                version = "1.0.0"
              }
            }
          } | ConvertTo-Json -Depth 5
          
          $response = Invoke-WebRequest -Uri http://localhost:8377/mcp -Method Post -Body $body -ContentType "application/json" -Headers @{"Accept" = "application/json, text/event-stream"} -UseBasicParsing
          Write-Host "Response: $($response.Content)"
          if ($response.Content -match "protocolVersion") {
            Write-Host "MCP Initialize successful!"
          } else {
            Write-Error "MCP Initialize failed"
            exit 1
          }
      - name: Stop Ripen Server
        if: always()
        shell: pwsh
        run: |
          if ($env:PROCESS_ID) {
            Stop-Process -Id $env:PROCESS_ID -Force
          }


  test_macos:
    name: Integration Test (macOS Native)
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.new_release_published == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Start server
        run: |
          uv run python src/ripen/api/server.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
      - name: Wait for Health Check
        run: |
          timeout=30
          while [ $timeout -gt 0 ]; do
            if curl -s http://localhost:8377/api/health | grep -q "ok"; then
              echo "Server is healthy!"
              exit 0
            fi
            sleep 1
            timeout=$((timeout-1))
          done
          echo "Timeout waiting for health check"
          exit 1
      - name: Stop server
        if: always()
        run: |
          kill $SERVER_PID || true
