name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'COMMERCIAL.md'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - 'COMMERCIAL.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  lint_and_test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: |
          uv run ruff check src tests
          uv run djlint src/ --check
      - name: Run Tests
        run: |
          # Tiered Testing: PRs only run fast unit tests. Full tests run on main.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running lightweight unit tests for PR..."
            uv run pytest tests/unit/ -v --timeout=60
          else
            echo "Running full test suite for main/push..."
            uv run pytest tests/unit/ tests/integration/ tests/system/ -v --durations=10 --timeout=120
          fi

  release:
    name: Semantic Release
    needs: lint_and_test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install and Run Semantic Release
        id: semantic
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          uv pip install python-semantic-release
          
          uv run semantic-release version
          
          if git describe --tags --exact-match HEAD >/dev/null 2>&1; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            uv run semantic-release publish
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
          fi

  build_assets:
    name: Build Windows Assets
    needs: release
    # Only run when a new release is actually published
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.new_release_published == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Install dependencies
        shell: bash
        run: |
          if [ ! -d ".venv" ]; then uv venv; fi
          ls -la
          uv pip install -e .
          uv pip install pyinstaller
      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --onefile --name Ripen --clean src/ripen/api/server.py
          uv run pyinstaller --onefile --name RipenInstaller --clean src/ripen/cli/register.py
      - name: Get Latest Tag
        id: tag
        shell: bash
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Ripen.exe
            dist/RipenInstaller.exe
          tag_name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: false
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
