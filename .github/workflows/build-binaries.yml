name: Build Ripen Binaries

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.ps1 | iex

    - name: Install dependencies
      run: |
        uv sync
        uv run pip install pyinstaller pyinstaller-hooks-contrib

    - name: Build All Ripen Binaries
      run: uv run scripts/build_exe.py all

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: ripen-binaries-windows
        path: |
          dist/ripen-hub.exe
          dist/ripen-admin.exe
        retention-days: 7

