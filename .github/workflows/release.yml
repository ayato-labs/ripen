name: Release

on:
  push:
    branches:
      - main
      - develop

jobs:
  quality-gate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff Check
        run: uv run ruff check .

      - name: Run Tests
        run: uv run pytest tests/

  semantic-release:
    name: Semantic Release
    needs: [quality-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Build EXE & Upload to Release
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Build Tools
        run: uv pip install pyinstaller Pillow

      - name: Build Standalone EXE
        run: uv run scripts/build_exe.py

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.semantic-release.outputs.new_release_version }}
          files: |
            dist/ripen-hub.exe
            dist/ripen-admin.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
